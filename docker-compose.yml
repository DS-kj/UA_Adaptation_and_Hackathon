services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SMTP_HOST: ${SMTP_HOST:-mail.xn--11b2bu4dwd.xn--i1b6b1a6a2e}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USER: ${SMTP_USER:-mailbox10}
