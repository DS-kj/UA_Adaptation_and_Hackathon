<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — CAN InfoTech</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #003580;
      color: white;
      padding: 16px 32px;
    }

    header h1 { font-size: 1.2rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.75; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .icon {
      width: 56px;
      height: 56px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.6rem;
    }

    h2 {
      font-size: 1.4rem;
      color: #003580;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    a {
      display: inline-block;
      padding: 10px 24px;
      background: #003580;
      color: white;
      border-radius: 5px;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
      transition: background 0.15s;
    }

    a:hover { background: #00286b; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.76rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>CAN InfoTech</h1>
  <span>Computer Association of Nepal</span>
</header>

<main>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h2>Thank you!</h2>
    <p>We have received your message and will get back to you at the email address you provided.</p>
    <a href="/">Back to Contact Us</a>
  </div>
</main>

<footer>CAN InfoTech &mdash; Kathmandu, Nepal</footer>

</body>
</html>
