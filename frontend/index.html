<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — CAN InfoTech</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #003580;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header span {
      font-size: 0.85rem;
      opacity: 0.75;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
    }

    .card h2 {
      font-size: 1.4rem;
      color: #003580;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 0.88rem;
      color: #666;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ccc;
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 6px;
    }

    input[type="text"]:focus {
      border-color: #003580;
    }

    .error {
      font-size: 0.8rem;
      color: #dc2626;
      min-height: 18px;
      margin-bottom: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #003580;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    input[type="submit"]:hover {
      background: #00286b;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.76rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>CAN InfoTech</h1>
    <span>Computer Association of Nepal</span>
  </div>
</header>

<main>
  <div class="card">
    <h2>Contact Us</h2>
    <p>Fill in your email address and we will get back to you shortly.</p>

    <form id="contact-form" novalidate>
      <label for="email">Email address</label>
      <input type="text" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
      <div class="error" id="email-error">Please enter a valid email address.</div>

      <input type="submit" value="Contact us" id="submit" />
    </form>
  </div>
</main>

<footer>CAN InfoTech &mdash; Kathmandu, Nepal</footer>

<script>
  const API = `http://${window.location.hostname}:8000/api/contact`;

  document.getElementById('contact-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    const emailInput  = document.getElementById('email');
    const errorEl     = document.getElementById('email-error');
    const submitBtn   = document.getElementById('submit');
    const value       = emailInput.value.trim();

    // Client-side format check
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    if (!valid) {
      errorEl.textContent = 'Please enter a valid email address.';
      errorEl.classList.add('show');
      emailInput.style.borderColor = '#dc2626';
      return;
    }

    errorEl.classList.remove('show');
    submitBtn.value    = 'Sending...';
    submitBtn.disabled = true;

    try {
      await fetch(API, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: value }),
      });
    } catch (_) {
      // email send is best-effort — redirect regardless
    } finally {
      window.location.href = '/success.html';
    }
  });

  document.getElementById('email').addEventListener('input', function () {
    this.style.borderColor = '';
    document.getElementById('email-error').classList.remove('show');
  });
</script>

</body>
</html>
